<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Ngàm và nẹp hoàn thiện cho hệ panel</title>
  <desc id="desc">Sơ đồ minh họa ngàm âm dương, lớp làm kín, nẹp U, V trong và V ngoài, không theo tỷ lệ.</desc>
  <defs>
    <pattern id="eps" width="22" height="20" patternUnits="userSpaceOnUse">
      <rect width="22" height="20" fill="#e8dfcf"/>
      <circle cx="6" cy="6" r="4.5" fill="#faf5ed" stroke="#bcb3a6" stroke-width="0.8"/>
      <circle cx="17" cy="5" r="4.8" fill="#f3ece1" stroke="#bcb3a6" stroke-width="0.8"/>
      <circle cx="12" cy="16" r="5" fill="#fffaf2" stroke="#bcb3a6" stroke-width="0.8"/>
    </pattern>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fdfbf6"/>
      <stop offset="1" stop-color="#c7c5bf"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0 0L8 4L0 8Z" fill="#a95335"/>
    </marker>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#252a27" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="1200" height="760" fill="#f3eee5"/>
  <path d="M0 0H1200V14H0Z" fill="#a95335"/>
  <circle cx="1108" cy="94" r="116" fill="#eadfce" opacity="0.55"/>
  <circle cx="1118" cy="78" r="72" fill="none" stroke="#a95335" stroke-opacity="0.16"/>

  <text x="72" y="80" fill="#a95335" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" letter-spacing="3">HỆ PANEL · CHI TIẾT LIÊN KẾT</text>
  <text x="72" y="130" fill="#252a27" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700">Ngàm, nẹp và lớp làm kín.</text>
  <text x="74" y="164" fill="#64625d" font-family="Arial, Helvetica, sans-serif" font-size="17">Các chi tiết phối hợp để định vị tấm và hoàn thiện chân vách, góc trong, góc ngoài.</text>

  <g transform="translate(846 67)">
    <rect width="282" height="38" rx="19" fill="#252a27"/>
    <text x="141" y="25" text-anchor="middle" fill="#fffaf2" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5">MINH HỌA · KHÔNG THEO TỶ LỆ</text>
  </g>

  <!-- Main tongue-and-groove card -->
  <g filter="url(#softShadow)">
    <rect x="72" y="204" width="1056" height="256" rx="26" fill="#fbf8f2" stroke="#d6cdbf"/>
  </g>
  <text x="104" y="245" fill="#252a27" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700">Ghép ngàm âm–dương</text>
  <text x="104" y="270" fill="#716d66" font-family="Arial, Helvetica, sans-serif" font-size="14">Mặt cắt giản lược — biên dạng thực tế được đối chiếu theo lô panel.</text>

  <!-- Left panel with tongue -->
  <path d="M112 305H430V328H486V354H430V377H112Z" fill="url(#eps)" stroke="#292e2b" stroke-width="2"/>
  <path d="M112 305H430V318H486" fill="none" stroke="url(#metal)" stroke-width="9" stroke-linecap="square"/>
  <path d="M112 377H430V364H486" fill="none" stroke="url(#metal)" stroke-width="9" stroke-linecap="square"/>
  <text x="386" y="414" fill="#a95335" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5">NGÀM DƯƠNG</text>
  <path d="M439 401L463 360" fill="none" stroke="#a95335" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Right panel with groove -->
  <path d="M536 305H939V377H536V358H500V324H536Z" fill="url(#eps)" stroke="#292e2b" stroke-width="2"/>
  <path d="M536 305H939M536 377H939" fill="none" stroke="url(#metal)" stroke-width="9"/>
  <path d="M536 305V324H500M536 377V358H500" fill="none" stroke="#9e9c96" stroke-width="7" stroke-linecap="square"/>
  <text x="545" y="414" fill="#a95335" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5">NGÀM ÂM</text>
  <path d="M550 398L523 353" fill="none" stroke="#a95335" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Assembly direction -->
  <path d="M306 287H424" fill="none" stroke="#a95335" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M714 287H596" fill="none" stroke="#a95335" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="510" y="291" text-anchor="middle" fill="#7a756d" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" letter-spacing="1.3">HƯỚNG GHÉP</text>

  <!-- Sealant indication -->
  <path d="M506 328Q518 341 506 354" fill="none" stroke="#a95335" stroke-width="7" stroke-linecap="round"/>
  <path d="M760 342H1011" fill="none" stroke="#7a756d" stroke-width="1.5"/>
  <circle cx="760" cy="342" r="5" fill="#a95335"/>
  <text x="790" y="330" fill="#a95335" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" letter-spacing="1.4">XỬ LÝ KÍN MỐI NỐI</text>
  <text x="790" y="354" fill="#64625d" font-family="Arial, Helvetica, sans-serif" font-size="14">Vị trí và vật liệu theo thiết kế thi công.</text>

  <!-- Three accessory cards -->
  <g filter="url(#softShadow)" fill="#fbf8f2" stroke="#d6cdbf">
    <rect x="72" y="490" width="328" height="200" rx="24"/>
    <rect x="436" y="490" width="328" height="200" rx="24"/>
    <rect x="800" y="490" width="328" height="200" rx="24"/>
  </g>

  <!-- U profile -->
  <g transform="translate(102 518)">
    <text x="0" y="18" fill="#a95335" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" letter-spacing="1.8">NẸP U</text>
    <text x="0" y="44" fill="#252a27" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Định vị chân vách</text>
    <line x1="6" y1="145" x2="284" y2="145" stroke="#77736d" stroke-width="3"/>
    <rect x="103" y="72" width="82" height="68" fill="url(#eps)" stroke="#292e2b" stroke-width="2"/>
    <path d="M92 65V151H196V65" fill="none" stroke="url(#metal)" stroke-width="9" stroke-linejoin="round"/>
    <path d="M99 146Q108 134 117 146" fill="none" stroke="#a95335" stroke-width="5" stroke-linecap="round"/>
    <text x="213" y="116" fill="#6b6862" font-family="Arial, Helvetica, sans-serif" font-size="13">Panel</text>
    <path d="M207 112H186" stroke="#7a756d"/>
  </g>

  <!-- Inner corner profile -->
  <g transform="translate(466 518)">
    <text x="0" y="18" fill="#a95335" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" letter-spacing="1.8">V TRONG</text>
    <text x="0" y="44" fill="#252a27" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Hoàn thiện góc lõm</text>
    <path d="M74 77H164V150H238" fill="none" stroke="#292e2b" stroke-width="45" stroke-linejoin="miter"/>
    <path d="M148 82V134H204" fill="none" stroke="url(#metal)" stroke-width="13" stroke-linejoin="round"/>
    <path d="M153 88Q165 99 174 133" fill="none" stroke="#a95335" stroke-width="4" stroke-linecap="round"/>
    <text x="206" y="91" fill="#6b6862" font-family="Arial, Helvetica, sans-serif" font-size="12">Mặt trong</text>
  </g>

  <!-- Outer corner profile -->
  <g transform="translate(830 518)">
    <text x="0" y="18" fill="#a95335" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" letter-spacing="1.8">V NGOÀI</text>
    <text x="0" y="44" fill="#252a27" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Bảo vệ góc lồi</text>
    <path d="M85 79H180V154H248" fill="none" stroke="#292e2b" stroke-width="45" stroke-linejoin="miter"/>
    <path d="M68 61H197V171" fill="none" stroke="url(#metal)" stroke-width="13" stroke-linejoin="round"/>
    <path d="M187 70Q197 83 188 96" fill="none" stroke="#a95335" stroke-width="4" stroke-linecap="round"/>
    <text x="58" y="142" fill="#6b6862" font-family="Arial, Helvetica, sans-serif" font-size="12">Mặt ngoài</text>
  </g>

  <text x="72" y="731" fill="#6f6b64" font-family="Arial, Helvetica, sans-serif" font-size="13">Chi tiết nẹp, liên kết và vật liệu làm kín được chốt theo vị trí lắp và cấu tạo công trình thực tế.</text>
</svg>
