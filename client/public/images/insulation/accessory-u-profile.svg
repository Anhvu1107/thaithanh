<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Nẹp U định vị chân vách panel</title>
  <desc id="desc">Sơ đồ kỹ thuật minh họa nẹp U ôm chân tấm panel và vị trí liên kết với nền, không theo tỷ lệ.</desc>
  <defs>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdf8"/>
      <stop offset="0.48" stop-color="#d8d5ce"/>
      <stop offset="1" stop-color="#aaa9a5"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e9e2d8"/>
      <stop offset="1" stop-color="#d0c7ba"/>
    </linearGradient>
    <pattern id="eps" width="24" height="22" patternUnits="userSpaceOnUse">
      <rect width="24" height="22" fill="#ebe3d7"/>
      <circle cx="6" cy="6" r="4.6" fill="#fffaf2" stroke="#beb4a7" stroke-width="0.8"/>
      <circle cx="18" cy="7" r="5" fill="#f7f0e6" stroke="#beb4a7" stroke-width="0.8"/>
      <circle cx="12" cy="18" r="5" fill="#fffaf2" stroke="#beb4a7" stroke-width="0.8"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="150%" height="170%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#252a27" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0L9 4.5L0 9Z" fill="#a95335"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="#f3eee5"/>
  <path d="M0 0H1200V14H0Z" fill="#a95335"/>
  <circle cx="1110" cy="92" r="118" fill="#e8ddcc" opacity="0.58"/>
  <circle cx="1121" cy="78" r="72" fill="none" stroke="#a95335" stroke-opacity="0.17"/>

  <text x="72" y="80" fill="#a95335" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" letter-spacing="3">PHỤ KIỆN PANEL · CHÂN VÁCH</text>
  <text x="72" y="130" fill="#252a27" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700">Nẹp U định vị chân panel.</text>
  <text x="74" y="164" fill="#64625d" font-family="Arial, Helvetica, sans-serif" font-size="17">Minh họa mặt cắt giúp nhận biết cách nẹp ôm tấm và liên kết với nền hoàn thiện.</text>

  <g transform="translate(871 68)">
    <rect width="257" height="38" rx="19" fill="#252a27"/>
    <text x="128.5" y="25" text-anchor="middle" fill="#fffaf2" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" letter-spacing="1.4">MẶT CẮT · KHÔNG THEO TỶ LỆ</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="72" y="208" width="712" height="472" rx="28" fill="#fbf8f2" stroke="#d6cdbf"/>
  </g>
  <text x="108" y="252" fill="#252a27" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700">Cấu tạo lắp tại chân vách</text>
  <text x="108" y="279" fill="#77716a" font-family="Arial, Helvetica, sans-serif" font-size="14">Chiều rộng nẹp chọn đồng bộ với bề dày tấm panel.</text>

  <path d="M117 596H737V636H117Z" fill="url(#floor)" stroke="#292e2b" stroke-width="2"/>
  <path d="M117 636H737" stroke="#a59c90" stroke-width="4"/>
  <text x="136" y="624" fill="#65615b" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" letter-spacing="1.5">NỀN HOÀN THIỆN</text>

  <rect x="305" y="318" width="242" height="268" rx="3" fill="url(#eps)" stroke="#292e2b" stroke-width="2"/>
  <path d="M305 318H547" stroke="url(#metal)" stroke-width="10"/>
  <path d="M305 318V586M547 318V586" stroke="#dedbd4" stroke-width="8"/>
  <path d="M274 414V600H578V414" fill="none" stroke="url(#metal)" stroke-width="18" stroke-linejoin="round"/>
  <path d="M274 414V600H578V414" fill="none" stroke="#252a27" stroke-width="2.2" stroke-linejoin="round"/>

  <path d="M320 586Q337 564 354 586M499 586Q516 564 533 586" fill="none" stroke="#a95335" stroke-width="8" stroke-linecap="round"/>
  <text x="354" y="566" fill="#a95335" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700">LÀM KÍN</text>

  <path d="M402 598V544" stroke="#292e2b" stroke-width="5"/>
  <path d="M390 544H414L408 526H396Z" fill="#a95335" stroke="#292e2b" stroke-width="2"/>
  <circle cx="402" cy="600" r="10" fill="#fbf8f2" stroke="#292e2b" stroke-width="3"/>

  <path d="M595 450H692" fill="none" stroke="#a95335" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="596" y="435" fill="#a95335" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" letter-spacing="1.4">THÀNH NẸP</text>
  <path d="M560 337H676" fill="none" stroke="#7c766f" stroke-width="1.5"/>
  <circle cx="560" cy="337" r="5" fill="#a95335"/>
  <text x="594" y="326" fill="#252a27" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700">Tấm panel</text>
  <text x="594" y="346" fill="#6b6761" font-family="Arial, Helvetica, sans-serif" font-size="12">Đặt lọt trong lòng nẹp</text>

  <g font-family="Arial, Helvetica, sans-serif">
    <g transform="translate(820 224)">
      <rect width="308" height="130" rx="22" fill="#fbf8f2" stroke="#d6cdbf"/>
      <circle cx="42" cy="42" r="20" fill="#a95335"/>
      <text x="42" y="47" text-anchor="middle" fill="#fffaf2" font-size="12" font-weight="700">01</text>
      <text x="76" y="38" fill="#252a27" font-size="17" font-weight="700">Định vị chân vách</text>
      <text x="76" y="64" fill="#68645e" font-size="13">Giữ đúng tuyến lắp panel.</text>
      <path d="M32 96H276" stroke="#ded5c8"/>
      <text x="32" y="118" fill="#a95335" font-size="11" font-weight="700" letter-spacing="1.4">NẸP U CHẤN GẤP</text>
    </g>
    <g transform="translate(820 376)">
      <rect width="308" height="130" rx="22" fill="#fbf8f2" stroke="#d6cdbf"/>
      <circle cx="42" cy="42" r="20" fill="#a95335"/>
      <text x="42" y="47" text-anchor="middle" fill="#fffaf2" font-size="12" font-weight="700">02</text>
      <text x="76" y="38" fill="#252a27" font-size="17" font-weight="700">Ôm theo bề dày tấm</text>
      <text x="76" y="64" fill="#68645e" font-size="13">Chốt kích thước khi đặt hàng.</text>
      <path d="M32 96H276" stroke="#ded5c8"/>
      <text x="32" y="118" fill="#a95335" font-size="11" font-weight="700" letter-spacing="1.4">U TRONG · U NGOÀI</text>
    </g>
    <g transform="translate(820 528)">
      <rect width="308" height="130" rx="22" fill="#252a27"/>
      <circle cx="42" cy="42" r="20" fill="#f3eee5"/>
      <text x="42" y="47" text-anchor="middle" fill="#a95335" font-size="12" font-weight="700">03</text>
      <text x="76" y="38" fill="#fffaf2" font-size="17" font-weight="700">Hoàn thiện mối chân</text>
      <text x="76" y="64" fill="#d8d2c8" font-size="13">Liên kết và làm kín theo nền.</text>
      <path d="M32 96H276" stroke="#555954"/>
      <text x="32" y="118" fill="#e1a58f" font-size="11" font-weight="700" letter-spacing="1.4">ĐỐI CHIẾU BẢN VẼ THỰC TẾ</text>
    </g>
  </g>

  <text x="72" y="730" fill="#6f6b64" font-family="Arial, Helvetica, sans-serif" font-size="13">Vật liệu, chiều dày và vị trí liên kết được xác nhận theo cấu tạo công trình.</text>
</svg>
