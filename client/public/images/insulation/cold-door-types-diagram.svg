<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Bốn dạng cửa kho lạnh</title>
  <desc id="desc">Sơ đồ cửa bản lề, cửa trượt, cửa song gài Inox và cửa song gài EPS cùng hướng chuyển động.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6f2eb"/>
      <stop offset="1" stop-color="#eee6dc"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#e8e5df"/>
      <stop offset="1" stop-color="#c9c5be"/>
    </linearGradient>
    <pattern id="eps" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="2" fill="#d9d0c5"/>
      <circle cx="9" cy="8" r="2.3" fill="#e4dcd2"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#443d36" flood-opacity="0.09"/>
    </filter>
    <marker id="arrowRust" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L10 5L0 10Z" fill="#a85d3b"/>
    </marker>
    <marker id="arrowGraphite" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L10 5L0 10Z" fill="#292b28"/>
    </marker>
    <style>
      .sans{font-family:Inter,"Segoe UI",Arial,sans-serif}.mono{font-family:"IBM Plex Mono",Consolas,monospace}
      .ink{fill:#292b28}.muted{fill:#6d665e}.rust{fill:#a85d3b}.line{stroke:#292b28;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}.fine{stroke:#81786f;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}.accent{stroke:#a85d3b;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}.dash{stroke-dasharray:8 8}
    </style>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)"/>
  <path d="M0 120H1200" stroke="#dbd0c4"/>
  <text x="60" y="58" class="sans ink" font-size="34" font-weight="700" letter-spacing="-1">Bốn dạng cửa kho lạnh</text>
  <text x="60" y="91" class="sans muted" font-size="15">Chọn cơ cấu mở theo lối đi, mặt bằng và điều kiện vận hành.</text>
  <g class="mono rust" font-size="12" font-weight="700" letter-spacing="1.8">
    <text x="1092" y="64">SƠ ĐỒ</text>
  </g>

  <!-- Card 01: hinged -->
  <g transform="translate(48 154)" filter="url(#shadow)">
    <rect width="264" height="500" rx="26" fill="#fbfaf7" stroke="#d9cec2"/>
    <text x="24" y="38" class="mono rust" font-size="12" font-weight="700">01</text>
    <text x="24" y="72" class="sans ink" font-size="22" font-weight="700">Bản lề</text>
    <text x="24" y="97" class="sans muted" font-size="13">Cánh quay quanh trục</text>
    <g transform="translate(26 132)">
      <path d="M38 20H198V276H38Z" fill="#ece7df" class="line"/>
      <path d="M55 39H181V258H55Z" fill="#2c2e2b" opacity="0.12"/>
      <path d="M55 39L146 64V246L55 258Z" fill="url(#steel)" class="line"/>
      <path d="M55 39V258" class="accent"/>
      <circle cx="131" cy="156" r="5" fill="#a85d3b"/>
      <path d="M173 55C215 91 219 203 173 241" fill="none" class="accent dash" marker-end="url(#arrowRust)"/>
      <text x="125" y="300" class="sans rust" font-size="12" font-weight="700">QUAY</text>
    </g>
    <path d="M24 454H240" stroke="#e1d7cc"/>
    <text x="24" y="478" class="sans muted" font-size="12">Cần khoảng quay cánh</text>
  </g>

  <!-- Card 02: sliding -->
  <g transform="translate(328 154)" filter="url(#shadow)">
    <rect width="264" height="500" rx="26" fill="#fbfaf7" stroke="#d9cec2"/>
    <text x="24" y="38" class="mono rust" font-size="12" font-weight="700">02</text>
    <text x="24" y="72" class="sans ink" font-size="22" font-weight="700">Cửa trượt</text>
    <text x="24" y="97" class="sans muted" font-size="13">Cánh chạy dọc mặt vách</text>
    <g transform="translate(19 132)">
      <path d="M22 44H224" class="line"/>
      <path d="M38 44V62M197 44V62" class="fine"/>
      <circle cx="69" cy="59" r="9" fill="#fbfaf7" class="line"/>
      <circle cx="164" cy="59" r="9" fill="#fbfaf7" class="line"/>
      <path d="M45 72H190V270H45Z" fill="#ece7df" class="line"/>
      <path d="M79 67H205V264H79Z" fill="url(#steel)" class="line"/>
      <path d="M94 85V246" class="fine" opacity="0.5"/>
      <rect x="169" y="159" width="19" height="6" rx="3" fill="#a85d3b"/>
      <path d="M55 302H204" fill="none" class="accent" marker-end="url(#arrowRust)"/>
      <text x="97" y="329" class="sans rust" font-size="12" font-weight="700">TRƯỢT</text>
    </g>
    <path d="M24 454H240" stroke="#e1d7cc"/>
    <text x="24" y="478" class="sans muted" font-size="12">Cần khoảng trượt bên hông</text>
  </g>

  <!-- Card 03: Inox latch -->
  <g transform="translate(608 154)" filter="url(#shadow)">
    <rect width="264" height="500" rx="26" fill="#fbfaf7" stroke="#d9cec2"/>
    <text x="24" y="38" class="mono rust" font-size="12" font-weight="700">03</text>
    <text x="24" y="72" class="sans ink" font-size="22" font-weight="700">Song gài Inox</text>
    <text x="24" y="97" class="sans muted" font-size="13">Tay gài tạo lực ép</text>
    <g transform="translate(34 132)">
      <rect x="18" y="25" width="164" height="250" rx="4" fill="#e9e4dc" class="line"/>
      <rect x="35" y="42" width="130" height="216" rx="3" fill="url(#steel)" class="line"/>
      <path d="M48 55V245M152 55V245" class="fine" opacity="0.45"/>
      <path d="M99 66V236" stroke="#454844" stroke-width="8" stroke-linecap="round"/>
      <path d="M99 78H59L48 94M99 224H141L152 208" fill="none" class="line"/>
      <circle cx="99" cy="151" r="18" fill="#a85d3b"/>
      <path d="M99 151H132" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
      <path d="M7 151H35M193 151H165" class="accent" marker-end="url(#arrowRust)"/>
      <text x="65" y="307" class="sans rust" font-size="12" font-weight="700">ÉP KÍN</text>
    </g>
    <path d="M24 454H240" stroke="#e1d7cc"/>
    <text x="24" y="478" class="sans muted" font-size="12">Chốt theo điều kiện vận hành</text>
  </g>

  <!-- Card 04: EPS latch -->
  <g transform="translate(888 154)" filter="url(#shadow)">
    <rect width="264" height="500" rx="26" fill="#fbfaf7" stroke="#d9cec2"/>
    <text x="24" y="38" class="mono rust" font-size="12" font-weight="700">04</text>
    <text x="24" y="72" class="sans ink" font-size="22" font-weight="700">Song gài EPS</text>
    <text x="24" y="97" class="sans muted" font-size="13">Cánh lõi EPS và tay gài</text>
    <g transform="translate(34 132)">
      <rect x="18" y="25" width="164" height="250" rx="4" fill="#e9e4dc" class="line"/>
      <rect x="35" y="42" width="130" height="216" rx="3" fill="url(#eps)" class="line"/>
      <path d="M46 42H154M46 258H154" stroke="#a85d3b" stroke-width="6"/>
      <path d="M99 68V232" stroke="#454844" stroke-width="8" stroke-linecap="round"/>
      <path d="M99 80H59L48 96M99 220H141L152 204" fill="none" class="line"/>
      <circle cx="99" cy="151" r="18" fill="#a85d3b"/>
      <path d="M99 151H132" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
      <path d="M7 151H35M193 151H165" class="accent" marker-end="url(#arrowRust)"/>
      <text x="65" y="307" class="sans rust" font-size="12" font-weight="700">ÉP KÍN</text>
    </g>
    <path d="M24 454H240" stroke="#e1d7cc"/>
    <text x="24" y="478" class="sans muted" font-size="12">Xác nhận phạm vi sử dụng</text>
  </g>

  <g transform="translate(48 688)">
    <circle cx="8" cy="8" r="8" fill="#a85d3b"/>
    <path d="M5 8L7.5 10.5L12 5.5" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="28" y="13" class="sans muted" font-size="13">Hướng mở và cấu hình được chốt theo mặt bằng thực tế.</text>
  </g>
</svg>
