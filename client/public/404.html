<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#0f211b">
    <meta name="description" content="Trang bạn đang tìm có thể đã được đổi địa chỉ hoặc không còn tồn tại.">
    <title>Không tìm thấy trang | Thái Thanh Panel</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <style>
      :root { color-scheme: light; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #0f211b; background: #fbfff8; }
      * { box-sizing: border-box; }
      body { min-width: 320px; min-height: 100vh; margin: 0; background: #fbfff8; }
      a { color: inherit; }
      .header { border-bottom: 1px solid #d8e5dd; }
      .container { width: min(100% - 2rem, 80rem); margin-inline: auto; }
      .brand { display: inline-flex; min-height: 6rem; align-items: center; text-decoration: none; }
      .brand-logo { display: block; width: 8rem; height: auto; }
      .main { display: grid; min-height: calc(100vh - 6rem); align-items: center; gap: 2rem; padding-block: 4rem; }
      .code { margin: 0; color: rgba(4, 120, 87, .15); font-family: Consolas, monospace; font-size: clamp(6rem, 18vw, 13rem); font-weight: 700; line-height: .8; }
      .panel { max-width: 42rem; border-top: .25rem solid #c6f23a; padding: clamp(1.75rem, 5vw, 2.5rem); background: #fff; box-shadow: 0 8px 24px rgba(15, 33, 27, .08); }
      .eyebrow { margin: 0; color: #047857; font-size: .75rem; font-weight: 800; letter-spacing: .2em; text-transform: uppercase; }
      h1 { margin: 1rem 0 0; font-size: clamp(2.25rem, 6vw, 3rem); line-height: 1.1; }
      .description { max-width: 36rem; margin: 1.25rem 0 0; color: #525252; line-height: 1.8; }
      .actions { display: flex; flex-wrap: wrap; gap: .75rem; margin-top: 2rem; }
      .button { display: inline-flex; min-height: 2.75rem; align-items: center; justify-content: center; border: 1px solid #d8e5dd; border-radius: 999px; padding: .65rem 1.25rem; font-size: .875rem; font-weight: 700; text-decoration: none; }
      .button-primary { border-color: #0f211b; background: #0f211b; color: #fff; }
      .button:focus-visible { outline: 2px solid #047857; outline-offset: 3px; }
      @media (min-width: 64rem) { .main { grid-template-columns: .7fr 1.3fr; gap: 4rem; } }
    </style>
  </head>
  <body>
    <header class="header">
      <div class="container">
        <a class="brand" href="/" aria-label="Thái Thanh Panel - Trang chủ">
          <img class="brand-logo" src="/images/brand/thai-thanh-logo-transparent-480.png" width="479" height="325" alt="Logo Thái Thanh Panel">
        </a>
      </div>
    </header>
    <main class="container main">
      <p class="code" aria-hidden="true">404</p>
      <section class="panel">
        <p class="eyebrow">Thái Thanh Panel / 404</p>
        <h1>Không tìm thấy trang</h1>
        <p class="description">Trang bạn đang tìm có thể đã được đổi địa chỉ hoặc không còn tồn tại.</p>
        <div class="actions">
          <a class="button button-primary" href="/">Về trang chủ</a>
          <a class="button" href="/contact">Liên hệ hỗ trợ</a>
        </div>
      </section>
    </main>
  </body>
</html>
